<!DOCTYPE html>
<html>
<head>

    <meta charset="utf-8">

    <title>图库</title>

    <style>

        :root {
            --bg: #f6f4ef;
            --panel: #ffffff;
            --text: #1f2328;
            --muted: #6b7280;
            --border: #d9d6cf;
            --accent: #2b6cb0;
            --accent-dark: #1e4e86;
            --tag: #efece6;
            --bg-accent-1: #fff7e6;
            --bg-accent-2: #eaf1ff;
        }

        body.dark {
            --bg: #0f1216;
            --panel: #1a1f27;
            --text: #e6e9ef;
            --muted: #9aa4b2;
            --border: #2a3240;
            --accent: #4aa3ff;
            --accent-dark: #2f7fd1;
            --tag: #243041;
            --bg-accent-1: #1a2430;
            --bg-accent-2: #101722;
        }

        body {
            font-family: "Noto Sans SC", "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            margin: 20px;
            background: radial-gradient(circle at 20% 0%, var(--bg-accent-1) 0%, transparent 45%),
                radial-gradient(circle at 80% 20%, var(--bg-accent-2) 0%, transparent 45%),
                var(--bg);
            color: var(--text);
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(4, minmax(160px, 1fr));
            gap: 10px;
            align-items: center;
            margin-bottom: 14px;
        }

    .controls input,
    .controls select {
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--panel);
        color: var(--text);
        box-shadow: inset 0 1px 0 rgba(0, 0, 0, 0.03);
        height: 34px;
        box-sizing: border-box;
    }

    .controls input[type="file"] {
        height: auto;
        padding: 6px 0;
        line-height: normal;
    }

    .controls button {
        padding: 8px 12px;
        border: 1px solid var(--border);
        background: #f8f6f2;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        color: #394150;
        transition: background 0.12s ease, border-color 0.12s ease, transform 0.12s ease;
    }

    .controls button:hover {
        background: #efece6;
        border-color: #cfc9be;
        transform: translateY(-1px);
    }

    .controls button:active {
        transform: translateY(0);
    }

    .input-wrap {
        position: relative;
        display: flex;
        align-items: center;
        min-height: 34px;
    }

    .input-wrap input {
        width: 100%;
        padding-right: 34px;
    }

    .input-wrap.file-wrap {
        gap: 8px;
    }

    .input-wrap.file-wrap input[type="file"] {
        padding-right: 10px;
    }

    .modal-controls input[type="file"] {
        border: 0;
        background: transparent;
        box-shadow: none;
        padding-left: 0;
    }

    .input-wrap.file-wrap .clear-btn {
        position: static;
        transform: none;
        flex: 0 0 auto;
    }

    .input-wrap.file-wrap input[type="file"]::-webkit-file-upload-button {
        margin-right: 10px;
        padding: 6px 10px;
        border: 1px solid #d2cdc2;
        border-radius: 6px;
        background: #f3f0ea;
        color: #394150;
        cursor: pointer;
        font-weight: 600;
        transition: background 0.12s ease, border-color 0.12s ease, transform 0.12s ease;
    }

    .input-wrap.file-wrap input[type="file"]::-webkit-file-upload-button:hover {
        background: #e9e5dc;
        border-color: #cfc9be;
        transform: translateY(-1px);
    }

    .input-wrap.file-wrap input[type="file"]::file-selector-button {
        margin-right: 10px;
        padding: 6px 10px;
        border: 1px solid #d2cdc2;
        border-radius: 6px;
        background: #f3f0ea;
        color: #394150;
        cursor: pointer;
        font-weight: 600;
        transition: background 0.12s ease, border-color 0.12s ease, transform 0.12s ease;
    }

    .input-wrap.file-wrap input[type="file"]::file-selector-button:hover {
        background: #e9e5dc;
        border-color: #cfc9be;
        transform: translateY(-1px);
    }

    .input-wrap .mode-select {
        position: absolute;
        right: 28px;
        height: 24px;
        border: 1px solid var(--border);
        background: #f8f6f2;
        padding: 0 6px;
        font-size: 12px;
        border-radius: 4px;
    }

    .input-wrap.with-mode input {
        padding-right: 90px;
    }

    .input-wrap.with-mode .mode-select {
        right: 34px;
    }

    .clear-btn {
        position: absolute;
        right: 4px;
        top: 50%;
        transform: translateY(-50%);
        height: 24px;
        width: 24px;
        border: 1px solid #e2ded6;
        background: #f3f0ea;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        border-radius: 4px;
        color: #6b7280;
        font-size: 14px;
        transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .clear-btn:hover {
        background: #e9e5dc;
        border-color: #d2cdc2;
        color: #374151;
    }

    .clear-btn:disabled {
        opacity: 0.4;
        cursor: default;
    }

        #wall {
            display: grid;
            grid-template-columns: repeat(6, minmax(0, 1fr));
            gap: 10px;
        }

        @media (max-width: 1400px) {
            #wall {
                grid-template-columns: repeat(5, minmax(0, 1fr));
            }
        }

        @media (max-width: 1200px) {
            #wall {
                grid-template-columns: repeat(4, minmax(0, 1fr));
            }
        }

        @media (max-width: 992px) {
            #wall {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        @media (max-width: 640px) {
            #wall {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 420px) {
            #wall {
                grid-template-columns: 1fr;
            }
        }

        .mode-simple #wall {
            grid-template-columns: 1fr;
        }

    .card {
        border: 1px solid var(--border);
        padding: 8px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        background: var(--panel);
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(15, 23, 42, 0.05);
        position: relative;
    }

        .img-frame {
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #faf9f6;
            border-radius: 8px;
        }

        .img-frame img {
            max-width: 100%;
            max-height: 100%;
            height: auto;
            object-fit: contain;
        }

    .tag {
        display: inline-block;
        background: var(--tag);
        padding: 3px 6px;
        margin: 2px;
        cursor: pointer;
        border-radius: 4px;
    }

    .img-title {
        text-align: center;
        margin-top: 6px;
        font-weight: 600;
    }

    .selected {
        background: #cfe8ff;
    }

    .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
    }

    .section-head h2 {
        margin: 0;
    }

    .toolbar {
        display: flex;
        gap: 12px;
        align-items: center;
    }

    .primary-btn {
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #fff;
        padding: 8px 14px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        letter-spacing: 0.2px;
        box-shadow: 0 6px 14px rgba(43, 108, 176, 0.2);
        transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease, border-color 0.12s ease;
    }

    .primary-btn:hover {
        background: var(--accent-dark);
        border-color: var(--accent-dark);
        transform: translateY(-1px);
        box-shadow: 0 10px 20px rgba(43, 108, 176, 0.25);
    }

    .primary-btn:active {
        transform: translateY(0);
        box-shadow: 0 4px 10px rgba(43, 108, 176, 0.18);
    }

    .modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
    }

    .modal.open {
        display: flex;
    }

    .modal-content {
        background: var(--panel);
        border: 1px solid var(--border);
        padding: 18px;
        min-width: 320px;
        max-width: 520px;
        width: 90%;
        border-radius: 10px;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.18);
    }

    .modal-edit {
        max-width: 860px;
    }

    .modal-add {
        max-width: 860px;
    }

    .add-modal-body {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 240px;
        gap: 18px;
        align-items: start;
    }

    .add-modal-body.single {
        grid-template-columns: 1fr;
    }

    .edit-modal-body {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 240px;
        gap: 18px;
        align-items: start;
    }

    .edit-modal-body.single {
        grid-template-columns: 1fr;
    }

    .edit-thumb {
        border: 1px solid var(--border);
        background: #faf9f6;
        border-radius: 10px;
        padding: 10px;
        display: grid;
        gap: 8px;
        justify-items: center;
        cursor: pointer;
        transition: transform 0.12s ease, box-shadow 0.12s ease;
    }

    .edit-thumb.disabled {
        cursor: default;
        opacity: 0.6;
    }

    .edit-thumb:hover:not(.disabled) {
        transform: translateY(-1px);
        box-shadow: 0 8px 16px rgba(15, 23, 42, 0.12);
    }

    .edit-thumb img {
        max-width: 100%;
        max-height: 260px;
        object-fit: contain;
        border-radius: 6px;
    }

    .edit-thumb .thumb-label {
        font-size: 12px;
        color: var(--muted);
    }

    .edit-side-actions {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 10px;
        margin-top: 10px;
    }

    .image-modal {
        position: relative;
        max-width: 92vw;
        max-height: 90vh;
        width: auto;
        padding: 16px;
    }

    .image-modal img {
        max-width: 88vw;
        max-height: 78vh;
        object-fit: contain;
        display: block;
    }

    .archive-preview-modal {
        position: relative;
        width: min(1200px, 96vw);
        max-width: 96vw;
        max-height: 92vh;
        padding: 16px;
        display: grid;
        gap: 14px;
    }

    .archive-preview-stage {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
    }

    .archive-preview-frame {
        min-height: 70vh;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.04);
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        padding: 10px;
    }

    .archive-preview-frame img {
        max-width: 100%;
        max-height: calc(90vh - 170px);
        object-fit: contain;
        display: block;
    }

    .archive-preview-hotzone {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 50%;
        z-index: 2;
        cursor: pointer;
    }

    .archive-preview-hotzone.left {
        left: 0;
        cursor: default;
    }

    .archive-preview-hotzone.right {
        right: 0;
        cursor: default;
    }

    .archive-preview-loading {
        color: var(--muted);
        font-size: 14px;
    }

    .archive-preview-loading.error {
        color: #c53030;
    }

    .archive-preview-nav {
        min-width: 72px;
        height: 48px;
    }

    .archive-preview-toolbar {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
    }

    .archive-preview-page-info {
        min-width: 90px;
        text-align: center;
        font-weight: 600;
    }

    .modal-close {
        position: absolute;
        top: 8px;
        right: 10px;
        border: 0;
        background: transparent;
        font-size: 20px;
        line-height: 1;
        cursor: pointer;
        color: #6b7280;
    }

    .modal-close:hover {
        color: #1f2328;
    }

    .modal-controls {
        grid-template-columns: 1fr;
        gap: 12px;
        margin-top: 6px;
    }

    .modal-content h3 {
        margin: 0 0 8px;
        font-size: 18px;
    }

    .modal-actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        margin-top: 16px;
    }

    .modal-actions button {
        padding: 8px 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #f8f6f2;
        cursor: pointer;
        font-weight: 600;
        color: #394150;
        transition: background 0.12s ease, border-color 0.12s ease, transform 0.12s ease;
    }

    .modal-actions .primary-btn {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
        box-shadow: 0 6px 14px rgba(43, 108, 176, 0.2);
    }

    .modal-actions .primary-btn:hover {
        background: var(--accent-dark);
        border-color: var(--accent-dark);
        transform: translateY(-1px);
        box-shadow: 0 10px 20px rgba(43, 108, 176, 0.25);
    }

    .modal-actions .primary-btn:active {
        transform: translateY(0);
        box-shadow: 0 4px 10px rgba(43, 108, 176, 0.18);
    }

    .modal-actions button:hover {
        background: #efece6;
        border-color: #cfc9be;
        transform: translateY(-1px);
    }

    .modal-actions button:active {
        transform: translateY(0);
    }

    .modal-actions .danger-btn {
        border-color: #d14343;
        background: #e34545;
        color: #fff;
        box-shadow: 0 6px 14px rgba(225, 69, 69, 0.2);
    }

    .modal-actions .danger-btn:hover {
        background: #cc3232;
        border-color: #cc3232;
        transform: translateY(-1px);
        box-shadow: 0 10px 20px rgba(204, 50, 50, 0.25);
    }

    .modal-actions .danger-btn:active {
        transform: translateY(0);
        box-shadow: 0 4px 10px rgba(204, 50, 50, 0.18);
    }

    .parse-row {
        display: flex;
        gap: 10px;
        align-items: flex-start;
    }

    .secondary-btn {
        padding: 8px 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #f8f6f2;
        cursor: pointer;
        font-weight: 600;
        color: #394150;
        transition: background 0.12s ease, border-color 0.12s ease, transform 0.12s ease;
        white-space: nowrap;
    }

    .secondary-btn:hover {
        background: #efece6;
        border-color: #cfc9be;
        transform: translateY(-1px);
    }

    .secondary-btn:active {
        transform: translateY(0);
    }

    .danger-btn {
        border: 1px solid #d14343;
        background: #e34545;
        color: #fff;
        padding: 8px 12px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        box-shadow: 0 6px 14px rgba(225, 69, 69, 0.2);
        transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease, border-color 0.12s ease;
    }

    .danger-btn:hover {
        background: #cc3232;
        border-color: #cc3232;
        transform: translateY(-1px);
        box-shadow: 0 10px 20px rgba(204, 50, 50, 0.25);
    }

    .danger-btn:active {
        transform: translateY(0);
        box-shadow: 0 4px 10px rgba(204, 50, 50, 0.18);
    }

    .parse-result {
        flex: 1;
        border: 1px dashed #d7d2c8;
        background: #faf8f3;
        border-radius: 8px;
        padding: 8px 10px;
        color: var(--muted);
        font-size: 12px;
        display: grid;
        gap: 4px;
    }

    .parse-item {
        display: flex;
        gap: 8px;
    }

    .parse-label {
        width: 68px;
        color: #7b8390;
        flex: 0 0 auto;
    }

    .row {
        display: flex;
        gap: 8px;
        align-items: center;
        justify-content: space-between;
    }

    .row-text {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
    }

    .row-title {
        margin-bottom: 2px;
    }

    .exists-badge {
        position: absolute;
        top: 8px;
        right: 8px;
        padding: 2px 6px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        border: 1px solid var(--border);
        background: #e6f1ea;
        color: #0f5132;
    }

    .exists-badge.no {
        background: #ffe6e6;
        border-color: #f2b8b8;
        color: #b42318;
    }

    .exists-badge.pending {
        background: #fff7e6;
        border-color: #f5d0a9;
        color: #c2410c;
    }

    .exists-inline {
        font-size: 12px;
        /*color: var(--muted);*/
        float: right;
        color: #0f5132;
    }

    .exists-inline.no {
        color: #b42318;
    }

    .exists-inline.pending {
        color: #c2410c;
    }

    .tag-editor {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: center;
        border: 0;
        padding: 6px;
        min-height: 34px;
        background: #fff;
        border-radius: 6px;
    }

    .tag-chip {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 6px;
        background: var(--tag);
        border-radius: 4px;
    }

    .tag-chip button {
        border: 0;
        background: transparent;
        cursor: pointer;
    }

    .tag-input {
        border: 0;
        outline: none;
        min-width: 120px;
        flex: 1;
        padding: 4px;
    }

    .icon-btn {
        height: 34px;
        width: 34px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: #f8f6f2;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: background 0.12s ease, border-color 0.12s ease, transform 0.12s ease;
    }

    .icon-btn:hover {
        background: #efece6;
        border-color: #cfc9be;
        transform: translateY(-1px);
    }

    .icon-btn:active {
        transform: translateY(0);
    }

    body.dark .icon-btn {
        background: #1b2330;
        border-color: #2a3240;
    }

    body.dark .icon-btn:hover {
        background: #222c3a;
        border-color: #334056;
    }

    .icon {
        width: 18px;
        height: 18px;
        position: relative;
        display: inline-block;
    }

    .icon-moon {
        background: #5b6b82;
        border-radius: 50%;
        box-shadow: inset -6px -2px 0 0 #f8f6f2;
    }

    body.dark .icon-moon {
        background: #d3d8e2;
        box-shadow: inset -6px -2px 0 0 #0f1216;
    }

    .icon-sun {
        background: #f5c542;
        border-radius: 50%;
        box-shadow:
            0 -8px 0 -6px #f5c542,
            0 8px 0 -6px #f5c542,
            8px 0 0 -6px #f5c542,
            -8px 0 0 -6px #f5c542,
            6px 6px 0 -6px #f5c542,
            -6px 6px 0 -6px #f5c542,
            6px -6px 0 -6px #f5c542,
            -6px -6px 0 -6px #f5c542;
    }

    .hidden {
        display: none;
    }

    .result-summary {
        margin-top: 12px;
        color: var(--muted);
        font-size: 12px;
        text-align: right;
    }

    @media (max-width: 900px) {
        .edit-modal-body {
            grid-template-columns: 1fr;
        }
    }

</style>

</head>

<body>

<div class="section-head">
    <h2>查询</h2>
    <div class="toolbar">
        <button class="primary-btn" onclick="openAddModal()">新增</button>
        <button id="themeBtn" class="icon-btn" onclick="toggleTheme()" aria-label="切换主题">
            <span id="themeIcon" class="icon icon-moon" aria-hidden="true"></span>
        </button>
    </div>
</div>

<div class="controls">
    <div class="input-wrap">
        <input id="q" placeholder="title like">
        <button class="clear-btn" onclick="clearInput('q')" aria-label="clear">×</button>
    </div>
    <div class="input-wrap">
        <input id="publish" placeholder="publish" list="publish-options">
        <button class="clear-btn" onclick="clearInput('publish')" aria-label="clear">×</button>
    </div>
    <div class="input-wrap with-mode">
        <input id="author_tag" placeholder="author tag" list="author-tag-options">
        <select id="author_tag_mode" class="mode-select">
            <option value="like">模糊</option>
            <option value="equal" selected>相等</option>
        </select>
        <button class="clear-btn" onclick="clearInput('author_tag')" aria-label="clear">×</button>
    </div>
    <div class="input-wrap">
        <select id="sort_by">
            <option value="id">ID</option>
            <!-- <option value="title">标题</option> -->
            <option value="publish">出版</option>
            <!-- <option value="author">作者</option> -->
            <!-- <option value="author_tag">作者标签</option> -->
            <option value="simple_title" selected>标题</option>
            <!-- <option value="remarks">备注</option> -->
        </select>
    </div>
    <button onclick="search()">查询</button>
    <button id="existsBtn" onclick="toggleExists()">查看全部</button>
    <button id="modeBtn" onclick="toggleMode()">图墙模式</button>
    <button id="wallTitleModeBtn" onclick="toggleWallTitleMode()">标题:title</button>
</div>

<datalist id="tag-options"></datalist>
<datalist id="tag-options-add"></datalist>
<datalist id="tag-options-edit"></datalist>
<datalist id="publish-options"></datalist>
<datalist id="author-tag-options"></datalist>

<div id="taglist"></div>

<hr>

<div id="wall"></div>

<div id="resultSummary" class="result-summary">当前展示 0 条，总计 0 条</div>

<div id="addModal" class="modal">
    <div class="modal-content modal-add" onclick="event.stopPropagation()">
        <h3>新增</h3>
        <div id="add_modal_body" class="add-modal-body single">
            <div>
                <div class="controls modal-controls">
                    <div class="input-wrap">
                        <input id="add_title" placeholder="title (required)">
                        <button class="clear-btn" onclick="clearInput('add_title')" aria-label="clear">×</button>
                    </div>
                    <div class="parse-row">
                        <button id="add_parse_btn" class="secondary-btn" onclick="parseAddTitle()">解析</button>
                        <div id="add_parse_result" class="parse-result hidden"></div>
                    </div>
                    <div class="input-wrap">
                        <div id="add_tags_editor" class="tag-editor">
                            <div id="add_tags_list"></div>
                            <input id="add_tags_input" class="tag-input" placeholder="custom tags" list="tag-options-add">
                        </div>
                        <button class="clear-btn" onclick="clearInput('add_tags')" aria-label="clear">×</button>
                    </div>
                    <div class="input-wrap file-wrap">
                        <input id="add_img" type="file" accept="image/*">
                        <button class="clear-btn" onclick="clearInput('add_img')" aria-label="clear">×</button>
                    </div>
                </div>
                <div class="modal-actions">
                    <button onclick="closeAddModal()">取消</button>
                    <button class="primary-btn" onclick="addItem()">提交</button>
                </div>
            </div>
            <div>
                <div id="add_thumb_wrap" class="edit-thumb hidden disabled">
                    <img id="add_thumb" alt="thumb preview">
                    <div class="thumb-label">本地图片预览</div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content modal-edit" onclick="event.stopPropagation()">
        <h3>编辑</h3>
        <div id="edit_modal_body" class="edit-modal-body">
            <div>
                <div class="controls modal-controls">
                    <div class="input-wrap">
                        <input id="edit_title" placeholder="title" readonly>
                    </div>
                    <div class="input-wrap">
                        <input id="edit_publish" placeholder="publish" list="publish-options">
                        <button class="clear-btn" onclick="clearInput('edit_publish')" aria-label="clear">×</button>
                    </div>
                    <div class="input-wrap">
                        <input id="edit_author" placeholder="author">
                        <button class="clear-btn" onclick="clearInput('edit_author')" aria-label="clear">×</button>
                    </div>
                    <div class="input-wrap">
                        <input id="edit_author_tag" placeholder="author tag" list="author-tag-options">
                        <button class="clear-btn" onclick="clearInput('edit_author_tag')" aria-label="clear">×</button>
                    </div>
                    <div class="input-wrap">
                        <input id="edit_simple_title" placeholder="simple title">
                        <button class="clear-btn" onclick="clearInput('edit_simple_title')" aria-label="clear">×</button>
                    </div>
                    <div class="input-wrap">
                        <select id="edit_is_exists">
                            <option value="1">在库</option>
                            <option value="2">待处理</option>
                            <option value="0">不在库</option>
                        </select>
                    </div>
                    <div class="input-wrap">
                        <input id="edit_remarks" placeholder="remarks">
                        <button class="clear-btn" onclick="clearInput('edit_remarks')" aria-label="clear">×</button>
                    </div>
                    <div class="input-wrap">
                        <div id="edit_tags_editor" class="tag-editor">
                            <div id="edit_tags_list"></div>
                            <input id="edit_tags_input" class="tag-input" placeholder="custom tags" list="tag-options-edit">
                        </div>
                        <button class="clear-btn" onclick="clearInput('edit_tags')" aria-label="clear">×</button>
                    </div>
                    <div class="input-wrap file-wrap">
                        <input id="edit_img" type="file" accept="image/*">
                        <button class="clear-btn" onclick="clearInput('edit_img')" aria-label="clear">×</button>
                    </div>
                </div>
                <div class="modal-actions">
                    <button onclick="closeEditModal()">取消</button>
                    <button class="primary-btn" onclick="submitEdit()">提交</button>
                </div>
            </div>
            <div>
                <div id="edit_thumb_wrap" class="edit-thumb">
                    <img id="edit_thumb" alt="thumb">
                    <div class="thumb-label">点击查看原始图片</div>
                </div>
                <div id="edit_side_actions" class="edit-side-actions">
                    <button class="danger-btn" onclick="confirmDelete(editingItemId)">删除</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="deleteModal" class="modal">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3>删除</h3>
        <div>确定要删除吗？</div>
        <div class="modal-actions">
            <button onclick="closeDeleteModal()">取消</button>
            <button class="danger-btn" onclick="confirmDeleteAction()">确定</button>
        </div>
    </div>
</div>

<div id="imageModal" class="modal">
    <div class="modal-content image-modal" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeImageModal()">×</button>
        <h3>原始图片</h3>
        <img id="original_img" alt="original">
    </div>
</div>

<div id="archivePreviewModal" class="modal" onclick="closeArchivePreviewModal(event)">
    <div class="modal-content archive-preview-modal" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeArchivePreviewModal()">×</button>
        <h3 id="archive_preview_title">在线预览</h3>
        <div class="archive-preview-stage">
            <button id="archive_preview_prev" class="archive-preview-nav" onclick="changeArchivePreviewPage(-1)">上一页</button>
            <div class="archive-preview-frame">
                <div class="archive-preview-hotzone left" onclick="changeArchivePreviewPage(-1)"></div>
                <div class="archive-preview-hotzone right" onclick="changeArchivePreviewPage(1)"></div>
                <div id="archive_preview_loading" class="archive-preview-loading">正在准备预览...</div>
                <img id="archive_preview_img" class="hidden" alt="archive preview">
            </div>
            <button id="archive_preview_next" class="archive-preview-nav" onclick="changeArchivePreviewPage(1)">下一页</button>
        </div>
        <div class="archive-preview-toolbar">
            <button onclick="changeArchivePreviewPage(-1)">上一页</button>
            <div id="archive_preview_page_info" class="archive-preview-page-info">-</div>
            <button onclick="changeArchivePreviewPage(1)">下一页</button>
        </div>
    </div>
</div>

<script src="/static/app.js"></script>

</body>
</html>
